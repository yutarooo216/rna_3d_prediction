version: '3.8'

services:
  proteinx:
    build:
      context: .              # Dockerfile があるディレクトリ
      dockerfile: Dockerfile # 明示的に指定（必要なら）
    image: proteinx:latest
    container_name: proteinx-container
    ports:
      - "8888:8888"   # 必要なポートに応じて変更
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [all]